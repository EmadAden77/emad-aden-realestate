<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب عماد عدن العقاري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Tajawal', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F5D061 50%, #AA8C2C 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold-gradient { background: linear-gradient(135deg, #AA8C2C 0%, #D4AF37 50%, #F5D061 100%); }
        .glass-panel { background: rgba(23, 23, 23, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <nav class="fixed w-full z-50 glass-panel border-b border-gold/30 h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <img src="IMG_5.jpg" class="w-12 h-12 rounded-full border-2 border-gold-500 shadow-lg">
            <span class="font-black text-xl md:text-2xl">مكتب <span class="gold-gradient">عماد عدن</span></span>
        </div>
        <a href="https://wa.me/967773571889" class="bg-gold-gradient text-black px-6 py-2 rounded-full font-bold text-sm">واتساب</a>
    </nav>

    <section class="pt-52 pb-32 text-center px-4">
        <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight">عقارات عدن في <br><span class="gold-gradient">أمان ومصداقية</span></h1>
        <button onclick="toggleChat()" class="bg-gold-gradient text-black px-12 py-4 rounded-full font-black text-xl shadow-xl hover:scale-105 transition-transform">اسأل المساعد العدني</button>
    </section>

    <div class="fixed bottom-8 right-8 z-[100] flex flex-col items-end">
        <div id="chat-window" class="hidden w-[350px] sm:w-[420px] glass-panel rounded-3xl mb-5 overflow-hidden flex flex-col shadow-2xl h-[550px] border-gold/40">
            <div class="bg-gold-gradient p-5 flex justify-between items-center text-black font-black">
                <div class="flex items-center gap-3">
                    <img src="IMG_5.jpg" class="w-10 h-10 rounded-full border border-black/20">
                    <span>مساعد عماد العدني</span>
                </div>
                <button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="chat-messages" class="flex-1 p-5 overflow-y-auto flex flex-col gap-4 bg-[#0d0d0d]">
                <div class="bg-dark-800 p-4 rounded-2xl rounded-tr-none text-sm border border-gold/10">يا حيا بك يابو عماد! فزعتك موجودة أيش تبي تعرف اليوم؟</div>
            </div>
            <div class="p-4 bg-[#141414] border-t border-gold/10 flex gap-3">
                <input type="text" id="chat-input" placeholder="اكتب سؤالك هنا..." class="flex-1 bg-black/50 text-white rounded-2xl px-5 py-3 text-sm border border-gray-800 outline-none" onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" class="w-14 h-14 rounded-2xl bg-gold-gradient text-black flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-paper-plane text-lg rtl:-scale-x-100"></i>
                </button>
            </div>
        </div>
        <button onclick="toggleChat()" class="w-20 h-20 rounded-full bg-gold-gradient p-1 shadow-2xl hover:scale-110 transition-transform">
            <img src="IMG_5.jpg" class="rounded-full w-full h-full object-cover">
        </button>
    </div>

    <script>
        function toggleChat() { document.getElementById('chat-window').classList.toggle('hidden'); }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatMessages = document.getElementById('chat-messages');
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, true);
            input.value = '';
            
            const loader = document.createElement('div');
            loader.className = 'bg-dark-800 p-3 rounded-xl self-start text-xs text-gold-500 animate-pulse';
            loader.textContent = 'جاري الرد...';
            chatMessages.appendChild(loader);

            try {
                // الحين بيكلم السيرفر اللي داخل مجلد api
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                loader.remove();
                addMsg(data.reply, false);
            } catch (e) {
                loader.remove();
                addMsg("يا حيا بك، في مشكلة بالاتصال. تأكد إنك حذفت الملف القديم وحطيت الجديد داخل مجلد api وسويت Redeploy.", false);
            }
        }

        function addMsg(t, u) {
            const d = document.createElement('div');
            d.className = u ? 'bg-gold-500 text-black font-black p-4 rounded-2xl rounded-tl-none self-end max-w-[85%] text-sm' : 'bg-dark-800 text-white p-4 rounded-2xl rounded-tr-none border border-gold/10 self-start max-w-[85%] text-sm';
            d.textContent = t;
            const chat = document.getElementById('chat-messages');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
