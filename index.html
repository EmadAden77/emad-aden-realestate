<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب عماد عدن العقاري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Tajawal', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F5D061 50%, #AA8C2C 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold-gradient { background: linear-gradient(135deg, #AA8C2C 0%, #D4AF37 50%, #F5D061 100%); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <nav class="fixed w-full z-50 glass-panel border-b border-gold/30 h-20 flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="IMG_5.jpg" class="w-12 h-12 rounded-full border-2 border-gold-500 shadow-lg">
                <div class="flex flex-col">
                    <span class="font-black text-xl">مكتب <span class="gold-gradient">عماد عدن</span></span>
                    <span class="text-[10px] text-gold-400 font-bold">عقارات • استثمار • عدن</span>
                </div>
            </div>
            <a href="https://wa.me/967773571889" class="bg-gold-gradient text-black px-5 py-2 rounded-full font-bold text-sm">واتساب</a>
        </div>
    </nav>

    <section class="pt-48 pb-32 text-center px-4 relative">
        <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">عقاراتك في <br><span class="gold-gradient">أمان ومصداقية</span></h1>
        <p class="text-gray-400 max-w-2xl mx-auto mb-12 text-lg">الخيار الأول لبيع وشراء وتثمين العقارات في عدن. خبرة تضمن لك أفضل استثمار.</p>
        <button onclick="toggleChat()" class="bg-gold-gradient text-black px-10 py-4 rounded-full font-black text-lg shadow-xl">تحدث مع المساعد الذكي</button>
    </section>

    <div class="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
        <div id="chat-window" class="chat-closed w-[320px] sm:w-[400px] glass-panel rounded-2xl mb-4 overflow-hidden flex flex-col shadow-2xl h-[500px]">
            <div class="bg-gold-gradient p-4 flex justify-between items-center text-black">
                <div class="flex items-center gap-3">
                    <img src="IMG_5.jpg" class="w-10 h-10 rounded-full border border-black/20">
                    <h4 class="font-black text-sm">مساعد عماد</h4>
                </div>
                <button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4 bg-[#0d0d0d]">
                <div class="bg-dark-800 text-white p-4 rounded-2xl rounded-tr-none border border-gold/10 self-start text-sm shadow-sm">
                    يا حيا بك في مكتب عماد عدن!🏠 أنا مساعدك الذكي، تسألني عن أي عقار في عدن؟
                </div>
            </div>
            <div class="p-4 bg-[#141414] border-t border-gold/10 flex gap-3">
                <input type="text" id="chat-input" placeholder="اكتب سؤالك..." class="flex-1 bg-black/40 text-white rounded-xl px-4 py-2 text-sm focus:outline-none border border-gray-800" onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" class="w-12 h-12 rounded-xl bg-gold-gradient text-black flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-paper-plane rtl:-scale-x-100"></i>
                </button>
            </div>
        </div>
        <button onclick="toggleChat()" class="w-16 h-16 rounded-full bg-gold-gradient p-1 shadow-2xl">
            <img src="IMG_5.jpg" class="rounded-full w-full h-full object-cover">
        </button>
    </div>

    <script>
        let isChatOpen = false;
        const chatWindow = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');

        function toggleChat() {
            isChatOpen = !isChatOpen;
            chatWindow.className = isChatOpen ? 'chat-open w-[320px] sm:w-[400px] glass-panel rounded-2xl mb-4 overflow-hidden flex flex-col shadow-2xl h-[500px]' : 'chat-closed w-[320px] sm:w-[400px] glass-panel rounded-2xl mb-4 overflow-hidden flex flex-col shadow-2xl h-[500px]';
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            addMsg(text, true);
            chatInput.value = '';
            const loader = document.createElement('div');
            loader.className = 'loader self-start my-2';
            chatMessages.appendChild(loader);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                loader.remove();
                addMsg(data.reply, false);
            } catch (e) {
                loader.remove();
                addMsg("يا حيا بك، يبدو في مشكلة بالاتصال. تأكد انك فاتح الموقع من رابط فيرسيل الجديد.", false);
            }
        }

        function addMsg(t, u) {
            const d = document.createElement('div');
            d.className = u ? 'bg-gold-500 text-black font-bold p-3 rounded-xl self-end max-w-[85%] text-sm' : 'bg-dark-800 text-white p-3 rounded-xl self-start max-w-[85%] text-sm border border-gold/10';
            d.textContent = t;
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
